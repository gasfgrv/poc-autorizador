spring.application.name=events

spring.cloud.aws.region.static=us-east-1

spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:test}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:test}

spring.cloud.aws.sqs.endpoint=${SQS_ENDPOINT:http://localhost:4566}
spring.cloud.aws.sqs.queue=${SQS_AUTORIZADOR_EVENTOS_QUEUE_URL:sqs-autorizador-eventos}

spring.cloud.aws.dynamodb.endpoin=${DYNAMODB_ENDPOINT:http://localhost:4566}

spring.kafka.bootstrap-servers=localhost:29092

spring.kafka.topic.publisher.name=autorizador-comando
spring.kafka.topic.consumer.name=autorizador-evento

spring.kafka.consumer.group-id=kafka-autorizador-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer